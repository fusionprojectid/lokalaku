<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <!-- Icons -->
  <link href="/favicon.webp" rel="icon" type="image/webp" />
  <link href="/apple-touch-icon.webp" rel="apple-touch-icon" />
  <title>Thank You - LokaLaku Trip</title>

  <!-- Bootstrap CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <!-- Style kamu -->
  <link rel="stylesheet" href="css/style.css" />

  <style>
    body {
      background:#f5f5f5;
      font-family:'Source Sans Pro',sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      text-align:center;
      padding:20px
    }
    .thank-you-box {
      background:#fff;
      padding:40px 30px;
      border-radius:12px;
      box-shadow:0 4px 20px rgba(0,0,0,.1);
      max-width:600px;
      width:100%;
      overflow:hidden;
    }
    .thank-you-box img.logo {
      max-width:160px;
      margin-bottom:20px;
    }
    .thank-you-box h1 {
      font-size:2em;
      color:#28a745;
      margin-bottom:20px
    }
    .thank-you-box p {
      font-size:1.1em;
      color:#333
    }
    .thank-you-box a {
      margin-top:20px;
      display:inline-block
    }

    /* Slideshow penuh kotak */
    .carousel-inner {
      width:100%;
      height:300px; /* tinggi slide */
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 4px 12px rgba(0,0,0,.12); /* shadow halus */
    }
    .carousel-inner img {
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* Fade lebih halus */
    .carousel-fade .carousel-item {
      transition: opacity 1.2s ease-in-out;
    }

    /* Efek zoom (Ken Burns) */
    .carousel-item img {
      animation: zoomEffect 6s ease-in-out infinite;
    }
    @keyframes zoomEffect {
      0%   { transform: scale(1); }
      100% { transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <div class="thank-you-box">
    <!-- Logo di atas -->
    <img src="images/logo-header.webp" alt="LokaLaku Logo" class="logo">

    <!-- Slideshow otomatis dengan fade + zoom -->
    <div id="thankYouCarousel" class="carousel slide carousel-fade mb-4" data-bs-ride="carousel" data-bs-interval="3000">
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="images/yogyakarta-explore.webp" alt="yogyakarta explore">
        </div>
        <div class="carousel-item">
          <img src="images/bali-tourism.webp" alt="bali tourism">
        </div>
        <div class="carousel-item">
          <img src="images/bromo-ijen-tour.webp" alt="bromo ijen tour">
        </div>
        <div class="carousel-item">
          <img src="images/baluran-banyuwangi-explore.webp" alt="baluran banyuwangi explore">
        </div>
        <div class="carousel-item">
          <img src="images/dieng-bromo-jogja-merapi.webp" alt="dieng bromo jogja merapi">
        </div>
        <div class="carousel-item">
          <img src="images/malang-city-tour.webp" alt="malang city tour">
        </div>
        <div class="carousel-item">
          <img src="images/malang-jogja-explore.webp" alt="malang jogja explore">
        </div>
        <div class="carousel-item">
          <img src="images/sikidang-explore.webp" alt="sikidang explore">
        </div>
		</div>
    </div>

    <!-- Text & Button -->
    <h1>Thank You! 🙏</h1>
    <p>Your message has been successfully sent.<br>We'll get back to you as soon as possible.</p>
    <a href="https://lokalaku.vercel.app/" class="btn btn-success">Back to Homepage</a>
  </div>

  <!-- Bootstrap JS via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
